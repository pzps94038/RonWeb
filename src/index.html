    <script>
      // GitHub Pages SPA 重導向（參考 github.com/rafgraph/spa-github-pages）
      // 從 404.html 傳來的 query string 還原為正確的前端路由路徑
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
