<section class="py-10 md:py-14 bg-base-200/30">
  <div class="container mx-auto px-4">
    <!-- 標題 -->
    <div class="text-center mb-12 animate-fade-in">
      <h2 class="text-3xl md:text-4xl font-bold text-base-content mb-3">技能</h2>
      <div class="w-12 h-1 bg-gradient-to-r from-primary to-secondary mx-auto rounded-full"></div>
    </div>

    <!-- 技能分類網格 -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-5xl mx-auto">
      @for (cat of skillCategories; track cat.category) {
      <div
        class="rounded-xl border border-base-content/10 bg-base-200/50 p-6 animate-fade-in-up"
        [style.animation-delay]="($index * 100) + 'ms'">
        <!-- 分類標題 -->
        <h3 class="text-sm font-mono text-primary mb-4 uppercase tracking-wider">
          {{ cat.category }}
        </h3>

        <!-- 技能項目 -->
        <div class="flex flex-wrap gap-2">
          @for (skill of cat.items; track skill) {
          <span
            class="text-sm px-3 py-1.5 rounded-lg bg-base-300/50 text-base-content/70 border border-base-content/5 hover:border-primary/30 hover:text-primary transition-all duration-200">
            {{ skill }}
          </span>
          }
        </div>
      </div>
      }
    </div>
  </div>
</section>
