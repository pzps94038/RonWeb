<div class="container mx-auto px-4 py-6">
  <div class="flex flex-col lg:flex-row gap-6">
    <!-- 主要內容區 -->
    <main class="w-full lg:w-3/4 order-2 lg:order-1">
      <router-outlet />
    </main>

    <!-- 側邊欄 -->
    <aside class="w-full lg:w-1/4 order-1 lg:order-2 flex flex-col gap-4">
      <!-- 搜尋欄 -->
      <form
        [formGroup]="form"
        (ngSubmit)="submit()"
        class="flex items-center gap-2 rounded-xl border border-base-content/10 bg-base-200/50 p-2">
        <input
          type="search"
          formControlName="keyword"
          placeholder="搜尋文章..."
          class="flex-1 min-w-0 bg-transparent border-0 outline-none text-sm font-mono text-base-content placeholder:text-base-content/30 px-2 py-1.5" />
        <button
          type="submit"
          class="shrink-0 px-3 py-1.5 rounded-lg bg-primary/15 text-primary text-xs font-mono font-medium hover:bg-primary/25 transition-colors duration-200">
          搜尋
        </button>
      </form>

      <!-- 分類 & 標籤 -->
      <app-article-category />
      <app-article-label />
    </aside>
  </div>
</div>
<app-footer />
