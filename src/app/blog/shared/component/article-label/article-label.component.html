<div class="rounded-lg border border-base-content/10 bg-base-100 overflow-hidden">
  <div class="px-4 py-3 border-b border-base-content/10">
    <span class="font-mono text-sm font-semibold">標籤</span>
  </div>
  <div class="p-3">
    <ng-container *ngIf="!isError(); else error">
      <ng-container *ngIf="!isLoading(); else loading">
        <div class="flex flex-wrap gap-1.5">
          <a
            *ngFor="let label of labels()"
            class="inline-flex items-center gap-1 rounded-full border border-base-content/10 px-2.5 py-1 text-xs text-base-content/70 hover:bg-base-200 hover:text-base-content transition-colors"
            [routerLink]="['label', label.labelId]">
            <ng-icon name="heroHashtag" size="12" />
            {{ label.labelName }}
          </a>
        </div>
      </ng-container>
    </ng-container>
    <ng-template #loading>
      <div class="flex flex-wrap gap-2">
        <div
          *ngFor="let i of [1, 2, 3, 4, 5]"
          class="h-6 w-16 rounded-full bg-base-content/5 animate-pulse"></div>
      </div>
    </ng-template>
    <ng-template #error>
      <app-error (refresh)="getArticleLabel()" />
    </ng-template>
  </div>
</div>
