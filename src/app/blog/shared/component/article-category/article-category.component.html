<div class="rounded-lg border border-base-content/10 bg-base-100 overflow-hidden">
  <div class="px-4 py-3 border-b border-base-content/10">
    <span class="font-mono text-sm font-semibold">分類</span>
  </div>
  <div class="p-3">
    <ng-container *ngIf="!isError(); else error">
      <ng-container *ngIf="!isLoading(); else loading">
        <a
          *ngFor="let category of categorys()"
          class="flex items-center gap-2 rounded-md px-2 py-1.5 text-sm text-base-content/70 hover:bg-base-200 hover:text-base-content transition-colors"
          [routerLink]="['category', category.categoryId]">
          <ng-icon name="heroFolder" size="14" />
          {{ category.categoryName }}
        </a>
      </ng-container>
    </ng-container>
    <ng-template #loading>
      <div
        *ngFor="let i of [1, 2, 3, 4, 5]"
        class="h-4 my-2 rounded bg-base-content/5 animate-pulse"></div>
    </ng-template>
    <ng-template #error>
      <app-error (refresh)="getArticleCategory()" />
    </ng-template>
  </div>
</div>
