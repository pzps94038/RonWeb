<!-- 頂部導航列 -->
<header class="w-full bg-base-100/70 backdrop-blur-xl">
  <!-- 頂部漸層火焰線 -->
  <div
    class="h-[2px] w-full bg-gradient-to-r from-transparent via-amber-500 to-transparent opacity-50"></div>

  <div class="container mx-auto flex h-14 items-center justify-between px-4">
    <!-- Logo -->
    <a routerLink="/blog" class="relative flex items-center no-underline group">
      <span
        class="font-mono text-xl font-extrabold tracking-widest text-gradient transition-all duration-300 group-hover:tracking-[0.2em]">
        RON
      </span>
      <!-- 底部漸層裝飾線 -->
      <span
        class="absolute -bottom-1 left-0 h-[2px] w-0 group-hover:w-full bg-gradient-to-r from-amber-400 via-orange-500 to-red-500 transition-all duration-500 rounded-full"></span>
    </a>

    <!-- 桌面連結 -->
    <nav class="hidden md:flex items-center gap-1">
      <a
        *ngFor="let link of links"
        [routerLink]="link.value"
        routerLinkActive="text-primary bg-primary/10"
        [routerLinkActiveOptions]="{ exact: link.value === '/blog' }"
        class="relative px-4 py-2 rounded-lg font-mono text-sm text-base-content/50 hover:text-primary hover:bg-primary/5 transition-all duration-200">
        {{ link.name }}
      </a>
    </nav>

    <!-- 行動裝置漢堡按鈕 -->
    <button
      class="p-2 rounded-lg hover:bg-primary/10 transition-all duration-200 md:hidden"
      (click)="toggleMobileMenu()"
      aria-label="選單">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-5 w-5"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2">
        <path
          *ngIf="!mobileMenuOpen()"
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M4 6h16M4 12h16M4 18h16" />
        <path
          *ngIf="mobileMenuOpen()"
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- 行動裝置選單 -->
  <div
    *ngIf="mobileMenuOpen()"
    class="md:hidden border-t border-base-content/5 bg-base-100/95 backdrop-blur-xl animate-fade-in">
    <nav class="container mx-auto flex flex-col px-4 py-3 gap-1">
      <a
        *ngFor="let link of links"
        [routerLink]="link.value"
        routerLinkActive="text-primary bg-primary/10"
        class="rounded-lg px-4 py-2.5 font-mono text-sm text-base-content/50 hover:text-primary hover:bg-primary/5 transition-all duration-200"
        (click)="mobileMenuOpen.set(false)">
        {{ link.name }}
      </a>
    </nav>
  </div>

  <!-- 底部分隔線 -->
  <div
    class="h-px w-full bg-gradient-to-r from-transparent via-base-content/10 to-transparent"></div>

  <!-- 載入進度條 -->
  <div *ngIf="progressLoading()" class="absolute bottom-0 left-0 h-0.5 w-full overflow-hidden">
    <div
      class="h-full w-1/3 bg-gradient-to-r from-amber-500 via-orange-500 to-red-500 animate-pulse"></div>
  </div>
</header>
