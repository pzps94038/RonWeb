<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="description" content="探索學習的無限可能，分享技術的無盡價值" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ron Web - 探索學習的無限可能，分享技術的無盡價值" />
    <meta property="og:description" content="探索學習的無限可能，分享技術的無盡價值" />
    <meta property="og:site_name" content="Ron Web" />
    <title>Ron Web - 探索學習的無限可能，分享技術的無盡價值</title>
    <script>
      // GitHub Pages SPA 重導向
      // 將當前路徑與查詢參數存入 sessionStorage，再導回首頁由 Angular 接管路由
      var pathSegmentsToKeep = 1; // '/RonWeb' 佔一段
      var l = window.location;
      sessionStorage.redirect =
        l.pathname
          .split('/')
          .slice(pathSegmentsToKeep + 1)
          .join('/') +
        l.search +
        l.hash;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, pathSegmentsToKeep + 1)
            .join('/') +
          '/',
      );
    </script>
  </head>
  <body></body>
</html>
