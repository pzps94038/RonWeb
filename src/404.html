<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="description" content="探索學習的無限可能，分享技術的無盡價值" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Ron Web - 探索學習的無限可能，分享技術的無盡價值" />
    <meta property="og:description" content="探索學習的無限可能，分享技術的無盡價值" />
    <meta property="og:site_name" content="Ron Web" />
    <title>Ron Web - 探索學習的無限可能，分享技術的無盡價值</title>
    <script>
      // GitHub Pages SPA 重導向（參考 github.com/rafgraph/spa-github-pages）
      // 將當前路徑編碼後透過 query string 傳回首頁，由 index.html 的腳本還原路由
      var pathSegmentsToKeep = 1; // '/RonWeb' 佔一段
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, pathSegmentsToKeep + 1)
            .join('/') +
          '/?' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('&') +
          (l.search ? '&' + l.search.slice(1) : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
